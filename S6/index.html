<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SF6 PDCA</title>
<style>
:root{--bg:#f4f6f8;--cb:#fff;--tm:#2d3748;--tx:#718096;--bd:#e2e8f0;--ac:#0bc5ea;--er:#f56565;--ok:#48bb78;--act:#ed8936;--st:#ecc94b}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--tm);margin:0;padding:10px;display:flex;flex-direction:column;align-items:center}
.bx{background:var(--cb);max-width:600px;width:100%;padding:20px;border-radius:8px;border:1px solid var(--bd);margin-bottom:20px;box-sizing:border-box}
.tb{display:flex;width:100%;max-width:600px;margin-bottom:10px;background:var(--cb);border-radius:8px;border:1px solid var(--bd);overflow:hidden}
.t-btn{flex:1;padding:12px 5px;background:0 0;border:0;font-weight:700;color:var(--tx);cursor:pointer}
.t-btn.a[data-t="do"],.t-btn.a[data-t="plan"]{background:var(--ac);color:#fff}
.t-btn.a[data-t="act"]{background:var(--act);color:#fff}
h2,h3{text-align:center;margin:0 0 15px}h2{border-bottom:2px solid var(--bg);padding-bottom:10px}
h3{font-size:1rem;color:var(--tx);text-align:left;border-left:4px solid var(--ac);padding-left:8px;margin-top:25px}
.fg{margin-bottom:15px}label{display:block;font-size:.9rem;font-weight:600;margin-bottom:6px}
select,textarea,input[type="text"]{width:100%;padding:10px;border:1px solid var(--bd);border-radius:6px;background:#fafafa;box-sizing:border-box}
.bg{display:flex;gap:8px}.tg{flex:1;padding:12px;background:#edf2f7;border:1px solid var(--bd);border-radius:6px;font-weight:600;cursor:pointer}
.tg.a{background:var(--tm);color:#fff}.tg.w.a{background:var(--ok);border-color:var(--ok)}.tg.l.a{background:var(--er);border-color:var(--er)}
.sb{width:100%;padding:14px;background:var(--ac);color:#fff;border:0;border-radius:6px;font-weight:700;cursor:pointer}.sb.act{background:var(--act)}
#lr{display:none;background:#fafafa;padding:15px;border-radius:6px;border:1px solid var(--bd)}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:.85rem}
.ch-gr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cd{background:#fafafa;border:1px solid var(--bd);border-radius:6px;padding:10px;text-align:center;cursor:pointer;font-weight:700}
.cd.ov{background:var(--tm);color:#fff;grid-column:1/-1;padding:15px}
.st{text-align:center;background:#fafafa;padding:10px;border-radius:6px;margin-bottom:15px;border:1px solid var(--bd)}
.sv{font-size:1.5rem;font-weight:700;color:var(--ac)}
.mi{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:10px;margin-bottom:10px}
.mi.s{background:#fffff0;border-color:var(--st);border-left:4px solid var(--st)}.mi.d{opacity:.6}.mi.d .mt{text-decoration:line-through}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:8px}.mh input{transform:scale(1.3);cursor:pointer}
.s-btn{background:0 0;border:0;font-size:1.2rem;cursor:pointer;color:#cbd5e0;padding:0}.s-btn.a{color:var(--st)}
.mt{flex:1;font-weight:700;font-size:.95rem}
.pc{background:#edf2f7;border-radius:8px;height:24px;position:relative;overflow:hidden;margin-bottom:5px}
.pf{background:var(--ok);height:100%;width:0;transition:width .5s}.pt{position:absolute;width:100%;text-align:center;line-height:24px;font-size:.85rem;font-weight:700}
.af{display:flex;gap:10px;margin-bottom:20px}.ab{flex:1;padding:8px;background:#fff;border:1px solid var(--bd);border-radius:20px;font-weight:700;color:var(--tx);cursor:pointer}.ab.a{background:var(--tm);color:#fff}
.at{background:#fff;border:1px solid var(--bd);border-radius:6px;margin-bottom:10px}.at.d{opacity:.6}.at.d .tt{text-decoration:line-through}
.ah{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer;background:#fafafa}.cb{background:var(--tm);color:#fff;font-size:.75rem;padding:2px 6px;border-radius:4px}.tt{flex:1;font-weight:700;font-size:.95rem}
.ei{font-size:.8rem;color:var(--tx)}.at.o .ei{transform:rotate(180deg)}.abdy{display:none;padding:12px;border-top:1px solid var(--bd);font-size:.9rem}.at.o .abdy{display:block}
.yt{margin-top:10px;position:relative;padding-bottom:56.25%;height:0}.yt iframe{position:absolute;width:100%;height:100%;border:0}
#cdlg{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:15px 25px;border-radius:30px;font-weight:700;display:none;opacity:0;transition:opacity .3s;z-index:99}
#add{display:none;background:#f8fafc;padding:15px;border-radius:6px;border:1px dashed var(--act);margin-bottom:20px}
</style></head><body>

<div id="cdlg">🎉 タスククリア！</div>
<div class="tb">
<button class="t-btn a" data-t="do" onclick="sT('do')">📝 記録(Do)</button><button class="t-btn" data-t="plan" onclick="sT('plan')">🎯 対策(Plan)</button><button class="t-btn" data-t="act" onclick="sT('act')">✅ 実行(Act)</button>
</div>

<div id="v-do" style="width:100%;display:flex;flex-direction:column;align-items:center">
<div class="bx"><h2>対戦ログ記録</h2>
<div style="display:flex;gap:15px;margin-bottom:15px"><div style="flex:1"><label>自キャラ</label><select id="mc"></select></div><div style="flex:1"><label>相手キャラ</label><select id="oc"></select></div></div>
<div class="fg"><label>勝敗</label><div class="bg" id="rg"><button class="tg w" onclick="sR(this,'WIN')">WIN</button><button class="tg l" onclick="sR(this,'LOSE')">LOSE</button></div></div>
<div id="lr"></div><div class="fg"><label>メモ(任意)</label><textarea id="mm" rows="2"></textarea></div>
<button class="sb" onclick="sv()">記録する</button></div></div>

<div id="v-plan" style="width:100%;display:none;flex-direction:column;align-items:center">
<div class="bx" id="pcl"><h2>キャラ別対策 ＆ 分析</h2><div class="ch-gr" id="pg"><div class="cd ov" onclick="oP('総合')">🌟 総合 (分析)</div></div></div>
<div class="bx" id="pdt" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><button style="padding:6px;border-radius:4px" onclick="cP()">← 戻る</button><h2 id="ptit" style="margin:0;border:0"></h2><div style="width:50px"></div></div>
<div class="st"><div style="font-size:.9rem;color:#718096;font-weight:700">勝率</div><div class="sv" id="pwr">--%</div><div style="font-size:.8rem" id="pmc"></div></div>
<div id="pms"><label>QUICK MEMO</label><div id="ml"></div></div>
<div id="pos" style="display:none;margin-top:20px;border-top:1px dashed #e2e8f0;padding-top:15px"><label>🔥 敗因トップ要素</label><div id="or" style="margin-bottom:15px"></div><label>📝 負け試合メモ</label><div id="om" style="font-size:.85rem;background:#fafafa;padding:10px;border-radius:6px"></div></div>
</div></div>

<div id="v-act" style="width:100%;display:none;flex-direction:column;align-items:center">
<div class="bx"><h2>進捗状況</h2><div class="pc"><div class="pf" id="apf"></div><div class="pt" id="apt">0%</div></div></div>
<div class="bx">
<div style="display:flex;justify-content:space-between;margin-bottom:15px"><div class="af"><button class="ab a" id="bfi" onclick="sF(false)">未完了</button><button class="ab" id="bfc" onclick="sF(true)">完了済</button></div><button style="background:0 0;border:0;color:var(--act);font-weight:700" onclick="tA()">＋ 新規タスク</button></div>
<div id="add"><div class="bg" style="margin-bottom:15px" id="ttg"><button class="tg a" onclick="sTT(this,'p')">基礎練習</button><button class="tg" onclick="sTT(this,'c')">キャラ対策</button></div>
<select id="ntc" style="display:none;margin-bottom:10px"></select><input type="text" id="ntt" placeholder="課題" style="margin-bottom:10px"><div id="ama" style="display:none"><textarea id="ntm" rows="2" placeholder="対応方法" style="margin-bottom:10px"></textarea><input type="text" id="ntu" placeholder="参考URL" style="margin-bottom:10px"></div><button class="sb act" onclick="svT()">追加</button></div>
<h3 style="border-left-color:var(--ok)">基礎練習</h3><div id="apl"></div><h3 style="border-left-color:var(--er)">キャラ対策</h3><div id="acl"></div>
</div></div>
<div style="text-align:center;margin:30px 0 20px"><button style="background:0 0;border:0;color:#cbd5e0;text-decoration:underline;cursor:pointer" onclick="rst()">全データをリセット</button></div>

<script>
const $id = id => document.getElementById(id);
const $q = q => document.querySelector(q);
const $$ = q => document.querySelectorAll(q);

const gS = k => JSON.parse(localStorage.getItem(k)) || (k === 'm' ? {} : []);
const sS = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const C = ["リュウ","ルーク","ジェイミー","春麗","ガイル","キンバリー","ジュリ","ケン","ブランカ","ダルシム","E.本田","ディージェイ","マノン","マリーザ","JP","ザンギエフ","リリー","キャミィ","ラシード","A.K.I.","エド","豪鬼","ベガ","テリー","不知火舞","エレナ","サガット","ヴァイパー","アレックス","イングリッド"];
const R = {"技術":["対空ミス","コンボミス","確反ミス","起き攻めミス"],"知識":["キャラ対策不足","わからない技","未知のセットプレイ"],"判断":["ぶっぱ","ライン管理","ゲージ管理"],"メンタル":["焦り","思考停止"]};
let cur='', fD=false, tT='p', sRst='';

window.onload=()=>{
 C.forEach(c=>{$id('mc').add(new Option(c,c));$id('oc').add(new Option(c,c));$id('ntc').add(new Option(c,c));
 let d=document.createElement('div');d.className='cd';d.innerText=c;d.onclick=()=>oP(c);$id('pg').appendChild(d);});
 let h='<label style="margin-bottom:12px">敗因チェック</label>';
 for(let[k,v]of Object.entries(R))h+=`<div style="margin-bottom:12px"><div style="font-size:.85rem;font-weight:700;border-bottom:1px solid #e2e8f0;margin-bottom:6px">${k}</div><div class="cg">${v.map(x=>`<label><input type="checkbox" value="${x}">${x}</label>`).join('')}</div></div>`;
 $id('lr').innerHTML=h; $id('mc').value="ケン"; $id('oc').value="ベガ";
};

function sT(t){$$('.t-btn').forEach(b=>b.classList.remove('a'));$q(`.t-btn[data-t="${t}"]`).classList.add('a');
['do','plan','act'].forEach(x=>$id(`v-${x}`).style.display=x===t?'flex':'none');if(t==='plan')cP();if(t==='act')rA();}

function sR(b,v){$$('#rg .tg').forEach(x=>x.classList.remove('a'));b.classList.add('a');sRst=v;$id('lr').style.display=v==='LOSE'?'block':'none';}

function sv(){
 if(!sRst)return alert('勝敗を選択してください。');
 let r=[];if(sRst==='LOSE')$$('#lr input:checked').forEach(c=>r.push(c.value));
 let l=gS('l');l.push({id:Date.now(),m:$id('mc').value,o:$id('oc').value,r:sRst,rs:r,mm:$id('mm').value,d:new Date().toISOString()});sS('l',l);
 $id('mm').value='';let b=$q('.sb');let o=b.innerText;b.innerText="記録完了！";b.style.background="var(--ok)";setTimeout(()=>{b.innerText=o;b.style.background=""},1500);
}

function oP(c){
 cur=c;$id('pcl').style.display='none';$id('pdt').style.display='block';$id('ptit').innerText=c==='総合'?'🌟 分析':`vs ${c}`;
 let l=gS('l'), tl=c!=='総合'?l.filter(x=>x.o===c):l, w=tl.filter(x=>x.r==='WIN').length;
 $id('pwr').innerText=tl.length?`${Math.round((w/tl.length)*100)}%`:'--%'; $id('pmc').innerText=`${tl.length}戦 ${w}勝 ${tl.length-w}敗`;
 $id('pos').style.display='block';$id('pms').style.display=c==='総合'?'none':'block';
 rO();if(c!=='総合')rM();
}
function cP(){$id('pdt').style.display='none';$id('pcl').style.display='block';}

function rO(){
 let ll=gS('l').filter(x=>x.r==='LOSE');
 if(cur!=='総合')ll=ll.filter(x=>x.o===cur);
 let rc={}, max=0;
 ll.forEach(x=>{if(x.rs)x.rs.forEach(r=>{rc[r]=(rc[r]||0)+1;if(rc[r]>max)max=rc[r];})});
 let sr=Object.entries(rc).sort((a,b)=>b[1]-a[1]), h='';
 sr.forEach(([r,c])=>h+=`<div style="display:flex;margin-bottom:6px;font-size:.85rem"><div style="width:90px;font-weight:700">${r}</div><div style="flex:1"><div style="background:var(--er);height:12px;width:${Math.max(5,(c/max)*100)}%"></div></div><div style="margin-left:10px">${c}回</div></div>`);
 $id('or').innerHTML=h||'<div style="color:#a0aec0">データなし</div>';
 let mh=''; ll.filter(x=>x.mm).slice().reverse().forEach(x=>{let d=new Date(x.d).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});mh+=`<div style="margin-bottom:8px;border-bottom:1px solid #e2e8f0"><div style="font-size:.75rem;color:#718096">${d}${cur==='総合'?` vs ${x.o}`:''}</div><div style="font-weight:700">${x.mm}</div></div>`});
 $id('om').innerHTML=mh||'<div style="color:#a0aec0">メモなし</div>';
}

function rM(){
 let a=gS('m'), m=a[cur]||[]; m.sort((x,y)=>(y.s-x.s)||((x.d===y.d)?0:x.d?1:-1));
 $id('ml').innerHTML=m.map(x=>`<div class="mi ${x.s?'s':''} ${x.d?'d':''}"><div class="mh"><input type="checkbox" ${x.d?'checked':''} onchange="tD('c',${x.id},'${cur}')"><button class="s-btn ${x.s?'a':''}" onclick="tS(${x.id})">★</button><div class="mt">${x.t}</div></div>${x.m?`<div style="font-size:.85rem;color:#718096;margin-bottom:5px">${x.m}</div>`:''}${x.u?`<a href="${x.u}" target="_blank" style="font-size:.8rem;color:var(--ac)">🔗 動画</a>`:''}</div>`).join('')||'<div style="color:#a0aec0;font-size:.85rem">タスクを追加してください</div>';
}
function tS(id){let a=gS('m'),m=a[cur].find(x=>x.id===id);if(!m.s&&a[cur].filter(x=>x.s).length>=3)return alert('★は3つまで！');m.s=!m.s;sS('m',a);rM();}

function dC(){let d=$id('cdlg');d.style.display='block';setTimeout(()=>d.style.opacity='1',10);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.style.display='none',300)},2000);}

function tD(t,id,c=null){
 let a=gS(t==='p'?'p':'m'), w=false;
 if(t==='p'){let k=a.find(x=>x.id===id);k.d=!k.d;w=k.d;sS('p',a);}else{let k=a[c].find(x=>x.id===id);k.d=!k.d;w=k.d;sS('m',a);}
 if(w)dC(); if($id('v-plan').style.display==='flex')rM(); if($id('v-act').style.display==='flex')rA();
}

function tA(){$id('add').style.display=$id('add').style.display==='block'?'none':'block';}
function sF(v){fD=v;$id('bfi').className=`ab ${!v?'a':''}`;$id('bfc').className=`ab ${v?'a':''}`;rA();}
function sTT(b,t){$$('#ttg .tg').forEach(x=>x.classList.remove('a'));b.classList.add('a');tT=t;$id('ntc').style.display=$id('ama').style.display=t==='c'?'block':'none';}

function getY(u){if(!u)return'';let m=u.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);return m&&m[2].length===11?`<div class="yt"><iframe src="https://www.youtube.com/embed/${m[2]}" allowfullscreen></iframe></div>`:`<a href="${u}" target="_blank">${u}</a>`;}
function opT(e){e.classList.toggle('o');}

function rA(){
 let p=gS('p'), cM=gS('m'), c=[]; for(let k in cM)cM[k].forEach(x=>c.push({...x,cn:k}));
 let tt=p.length+c.length, dt=p.filter(x=>x.d).length+c.filter(x=>x.d).length, pct=tt===0?0:Math.round((dt/tt)*100);
 $id('apf').style.width=`${pct}%`; $id('apt').innerText=`${pct}% (${dt}/${tt})`;
 let ph='', ch='';
 p.filter(x=>x.d===fD).forEach(x=>ph+=`<div class="at ${x.d?'d':''}"><div class="ah"><input type="checkbox" ${x.d?'checked':''} onchange="tD('p',${x.id})"><span class="tt">${x.t}</span></div></div>`);
 c.filter(x=>x.d===fD).forEach(x=>ch+=`<div class="at ${x.d?'d':''}" onclick="opT(this)"><div class="ah"><input type="checkbox" ${x.d?'checked':''} onclick="event.stopPropagation();tD('c',${x.id},'${x.cn}')"><span class="cb">${x.cn}</span><span class="tt">${x.t}</span><span class="ei">▼</span></div><div class="abdy" onclick="event.stopPropagation()">${x.m?`<div style="font-size:.8rem;font-weight:700">対応方法</div><div>${x.m}</div>`:''}${getY(x.u)}</div></div>`);
 $id('apl').innerHTML=ph||'<div style="color:#a0aec0;font-size:.9rem">なし</div>'; $id('acl').innerHTML=ch||'<div style="color:#a0aec0;font-size:.9rem">なし</div>';
}

function svT(){
 let tit=$id('ntt').value.trim(); if(!tit)return alert('課題を入力'); let id=Date.now();
 if(tT==='p'){let a=gS('p');a.push({id:id,t:tit,d:false});sS('p',a);}else{
  let cn=$id('ntc').value, a=gS('m'); if(!a[cn])a[cn]=[];
  a[cn].push({id:id,t:tit,m:$id('ntm').value.trim(),u:$id('ntu').value.trim(),d:false,s:false});sS('m',a);
 }
 $id('ntt').value=$id('ntm').value=$id('ntu').value='';$id('add').style.display='none';rA();
}

function rst(){if(confirm("全データを削除します。よろしいですか？")){localStorage.removeItem('l');localStorage.removeItem('m');localStorage.removeItem('p');location.reload();}}
</script></body></html>
